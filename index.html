<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لبسمه ❤️</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff9acb,#ff4d9d,#ff006f);
  overflow:hidden;
  color:white;
  text-align:center;
}

/* floating hearts */
.heart{
  position:absolute;
  color:white;
  font-size:20px;
  animation:float 6s linear infinite;
  opacity:0.7;
}

@keyframes float{
  from{transform:translateY(100vh); opacity:0;}
  to{transform:translateY(-10vh); opacity:1;}
}

.card{
  position:relative;
  max-width:700px;
  margin:40px auto;
  background:rgba(255,255,255,0.15);
  padding:25px;
  border-radius:25px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.gallery{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.gallery img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:20px;
  border:2px solid white;
}

.counter{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.time{
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:15px;
  width:80px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:white;
  color:#ff006f;
  font-weight:bold;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  color:#ff006f;
  padding:30px;
  border-radius:20px;
  max-width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h1>بسمه ❤️</h1>

<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<h2>❤️ بقالنا سوا ❤️</h2>

<div class="counter">
  <div class="time"><span id="days">0</span><br>يوم</div>
  <div class="time"><span id="hours">0</span><br>ساعة</div>
  <div class="time"><span id="minutes">0</span><br>دقيقة</div>
  <div class="time"><span id="seconds">0</span><br>ثانية</div>
</div>

<p>بحبك يا بسمه أكتر من أي حاجة ❤️</p>

<button onclick="openPopup()">اضغطي هنا 💌</button>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>💖 رسالة سرية 💖</h2>
    <p>أنا مش عايز حاجة من الدنيا غيرك ❤️</p>
    <button onclick="closePopup()">إغلاق</button>
  </div>
</div>

<script>
const startDate = new Date("2025-11-27T00:00:00");

function update(){
  const now = new Date();
  const diff = now - startDate;

  document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((diff/(1000*60*60))%24);
  document.getElementById("minutes").innerText = Math.floor((diff/(1000*60))%60);
  document.getElementById("seconds").innerText = Math.floor((diff/1000)%60);
}

setInterval(update,1000);
update();

function openPopup(){
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* hearts generator */
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+4)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
